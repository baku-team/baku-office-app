# 配布リポジトリ同梱の CI チェック。
# オートパイロット（AI）のPRはこのチェックが success のときのみマージされます（壊れた変更の本番反映を防止）。
# wrangler dry-run で「アプリが正しくビルド/バンドルできるか」を検証（デプロイはしない・シークレット不要）。
name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate build (wrangler dry-run)
        run: npx -y wrangler@4 deploy --dry-run
